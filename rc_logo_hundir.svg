<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RC logo animado — Roberto Cantero</title>
  <desc>Logo ASCII animado con efecto terminal verde para el README del proyecto hundir_la_flota</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .ascii {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 15px;
        fill: #00e5a0;
        text-anchor: start;
      }

      .ascii-row { animation: faderow 0.5s ease both; }
      .r1 { animation-delay: 0.1s; }
      .r2 { animation-delay: 0.25s; }
      .r3 { animation-delay: 0.4s; }
      .r4 { animation-delay: 0.55s; }
      .r5 { animation-delay: 0.7s; }
      .r6 { animation-delay: 0.85s; }

      @keyframes faderow {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      .glow { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.75; }
      }

      .byline {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 13px;
        fill: #00b87a;
        text-anchor: middle;
        animation: faderow 0.6s ease 1.1s both;
      }

      .cursor {
        fill: #00e5a0;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      .scanline {
        fill: none;
        stroke: #00e5a0;
        stroke-width: 1;
        opacity: 0.18;
        animation: scan 2.8s linear infinite;
      }
      @keyframes scan {
        0%   { transform: translateY(0px); }
        100% { transform: translateY(220px); }
      }

      .corner { stroke: #00e5a055; stroke-width: 1.5; fill: none; }

      .title {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 14px;
        fill: #e2fdf4;
        letter-spacing: 3px;
        text-anchor: middle;
        animation: faderow 0.6s ease 1.5s both;
      }

      .divider {
        stroke: #00e5a030;
        stroke-width: 1;
        animation: growline 0.8s ease 1.8s both;
        transform-origin: 340px 168px;
      }
      @keyframes growline {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }

      .ship {
        fill: none;
        stroke: #00e5a0;
        stroke-width: 1.5;
        stroke-linejoin: round;
        stroke-linecap: round;
        opacity: 0;
        animation: shipin 0.5s ease 2.0s forwards;
      }
      .ship-line {
        fill: none;
        stroke: #00e5a0;
        stroke-width: 1;
        stroke-linecap: round;
        opacity: 0;
        animation: shipin 0.5s ease 2.0s forwards;
      }
      @keyframes shipin {
        from { opacity: 0; }
        to   { opacity: 0.5; }
      }

      .bg-rect { fill: #0d1f17; }
    </style>
  </defs>

  <rect class="bg-rect" x="0" y="0" width="680" height="220" rx="8"/>
  <line class="scanline" x1="0" y1="-220" x2="680" y2="-220"/>

  <polyline class="corner" points="24,14 14,14 14,24"/>
  <polyline class="corner" points="656,14 666,14 666,24"/>
  <polyline class="corner" points="24,206 14,206 14,196"/>
  <polyline class="corner" points="656,206 666,206 666,196"/>

  <!-- barco pirata izquierda -->
  <!-- casco -->
  <path class="ship" d="M 55,126 L 61,116 L 99,116 L 105,126 Q 80,134 55,126 Z"/>
  <!-- mástil -->
  <line class="ship-line" x1="80" y1="116" x2="80" y2="83"/>
  <!-- vela principal (derecha del mástil) -->
  <path class="ship-line" d="M 81,87 L 101,110 L 81,116"/>
  <!-- vela de proa (izquierda, más pequeña) -->
  <path class="ship-line" d="M 79,92 L 61,107 L 79,114"/>
  <!-- gallardete en lo alto -->
  <path class="ship" d="M 80,83 L 91,86 L 80,90 Z"/>
  <!-- olas -->
  <path class="ship-line" d="M 50,132 Q 65,128 80,132 Q 95,136 110,132"/>

  <!-- barco pirata derecha (espejo) -->
  <!-- casco -->
  <path class="ship" d="M 575,126 L 581,116 L 619,116 L 625,126 Q 600,134 575,126 Z"/>
  <!-- mástil -->
  <line class="ship-line" x1="600" y1="116" x2="600" y2="83"/>
  <!-- vela principal (izquierda del mástil, espejo) -->
  <path class="ship-line" d="M 599,87 L 579,110 L 599,116"/>
  <!-- vela de proa (derecha, más pequeña, espejo) -->
  <path class="ship-line" d="M 601,92 L 619,107 L 601,114"/>
  <!-- gallardete en lo alto -->
  <path class="ship" d="M 600,83 L 589,86 L 600,90 Z"/>
  <!-- olas -->
  <path class="ship-line" d="M 570,132 Q 585,128 600,132 Q 615,136 630,132"/>

  <g class="glow">
    <text class="ascii ascii-row r1" x="268" y="62">&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2557;  &#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2557;</text>
    <text class="ascii ascii-row r2" x="268" y="80">&#x2588;&#x2588;&#x2554;&#x2550;&#x2550;&#x2588;&#x2588;&#x2557;&#x2588;&#x2588;&#x2554;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;</text>
    <text class="ascii ascii-row r3" x="268" y="98">&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2554;&#x255D;&#x2588;&#x2588;&#x2551;&#x00A0;&#x00A0;&#x00A0;&#x00A0;&#x00A0;</text>
    <text class="ascii ascii-row r4" x="268" y="116">&#x2588;&#x2588;&#x2554;&#x2550;&#x2550;&#x2588;&#x2588;&#x2557;&#x2588;&#x2588;&#x2551;&#x00A0;&#x00A0;&#x00A0;&#x00A0;&#x00A0;</text>
    <text class="ascii ascii-row r5" x="268" y="134">&#x2588;&#x2588;&#x2551;&#x00A0;&#x00A0;&#x2588;&#x2588;&#x2551;&#x255A;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2557;</text>
    <text class="ascii ascii-row r6" x="268" y="152">&#x255A;&#x2550;&#x255D;&#x00A0;&#x00A0;&#x255A;&#x2550;&#x255D;&#x00A0;&#x255A;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;</text>
  </g>

  <line class="divider" x1="200" y1="168" x2="480" y2="168"/>

  <text class="byline" x="340" y="184">&gt; by Roberto Cantero</text>
  <rect class="cursor" x="476" y="172" width="8" height="13" rx="1"/>

  <text class="title" x="340" y="205">HUNDIR LA FLOTA — EDICIÓN PIRATA</text>
</svg>
